<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quotation</title>
<style>

  body {

    font-family: "Times New Roman", serif;

    margin: 30px;

    font-size: 14px;

  }

  .header {

    display: flex;

    justify-content: space-between;

    border-bottom: 2px solid black;

    padding-bottom: 10px;

  }

  .company {

    color: purple;

    font-size: 26px;

    font-weight: bold;

  }

  .right {

    text-align: right;

    font-size: 12px;

    line-height: 18px;

  }

  /* BILL + DATE */

  .top-right {

    text-align: right;

    margin-top: 10px;

  }

  .top-right input {

    border: none;              /* ❌ removed underline */

    outline: none;

    background: transparent;

    width: 120px;

    font-family: inherit;

    font-size: 14px;

    text-align: right;

  }

  .section {

    margin-top: 20px;

  }

  .label {

    font-weight: bold;

  }

  textarea {

    width: 100%;

    border: none;

    outline: none;

    font-family: inherit;

    font-size: 14px;

    resize: none;

  }
</style>
</head>
<body>
<!-- HEADER -->
<div class="header">
<div>
<div class="company">VIGNU ENTERPRISES</div>
<div>GST NO: 33BCKPV5857M2ZP</div>
</div>
<div class="right">

    📞 8056132137<br>

    ✉ vignuenterprises@gmail.com<br>

    32B Natesan Nagar, Madhavaram,<br>

    Chennai - 600060
</div>
</div>
<!-- BILL + DATE -->
<div class="top-right">
<div>
<b>Bill No:</b>
<input type="text" placeholder="Enter Bill No">
</div>
<div style="margin-top:5px;">
<b>Date:</b>
<input type="text" placeholder="DD/MM/YYYY">
</div>
</div>
<!-- FROM -->
<div class="section">
<div class="label">From,</div>
<textarea rows="4" placeholder="Enter your details"></textarea>
</div>
<!-- TO -->
<div class="section">
<div class="label">To,</div>
<textarea rows="4" placeholder="Enter client details"></textarea>
</div>
</body>
</html>
